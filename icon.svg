<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#d97706"/>
      <stop offset="100%" stop-color="#b45309"/>
    </linearGradient>
  </defs>
  <!-- Full-bleed background so the icon survives circular / rounded masking -->
  <rect width="512" height="512" fill="url(#bg)"/>
  <!-- Saffron-thread accent (matches the page brand mark) -->
  <path d="M 130 180 Q 200 120, 270 180 T 380 180"
        stroke="#fff8e1" stroke-width="14" fill="none"
        stroke-linecap="round" opacity="0.75"/>
  <!-- PF wordmark in serif -->
  <text x="256" y="370" text-anchor="middle"
        font-family="Georgia, 'Playfair Display', serif"
        font-size="220" font-weight="700" fill="white"
        letter-spacing="-8">PF</text>
</svg>
